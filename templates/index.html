<!DOCTYPE html>
<html>
<head>
    <title>Ebook</title>

    <!-- WAJIB untuk responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <h1 class="mb-3 text-center">Daftar Ebook Rptra Vikamas 2</h1>

    <!-- Tombol -->
    <div class="d-flex flex-column flex-md-row gap-2 mb-3">
        <a href="/upload" class="btn btn-primary w-100">Upload Ebook</a>
        <a href="/kategori" class="btn btn-secondary w-100">Kategori Ebook</a>
    </div>

    <!-- Grid Ebook -->
    <div class="row">
        {% for ebook in ebooks %}
        <div class="col-6 col-md-4 col-lg-3 mb-3">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title">{{ ebook.title }}</h6>

                    <a href="/download/{{ ebook.filename }}" 
                       class="btn btn-success mt-auto w-100">
                       Download
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>
</body>
</html>
